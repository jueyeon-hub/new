<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인턴 면담 일지 자동 작성기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+AC:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nanum Square AC', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 820px; margin: 0 auto; }
header { margin-bottom: 2rem; }
header h1 { font-size: 22px; font-weight: 800; color: #1a1a1a; line-height: 1.3; margin-bottom: 4px; }
header p { font-size: 13px; color: #888; }
.accent { color: #F04D22; }

.card { background: #fff; border-radius: 16px; border: 0.5px solid #e0ddd6; padding: 1.5rem; margin-bottom: 1rem; }
.card-title { font-size: 13px; font-weight: 700; color: #F04D22; letter-spacing: 0.05em; margin-bottom: 1rem; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
label { display: block; font-size: 12px; font-weight: 700; color: #666; margin-bottom: 6px; }
label .sub { font-weight: 400; color: #bbb; }
input[type="text"], input[type="date"], select {
  width: 100%; padding: 10px 12px; border: 1px solid #e0ddd6; border-radius: 8px;
  font-family: 'Nanum Square AC', sans-serif; font-size: 14px; color: #1a1a1a;
  background: #faf9f7; outline: none; transition: border-color 0.15s;
}
input:focus, select:focus { border-color: #F04D22; background: #fff; }
input[readonly] { color: #888; cursor: default; }




/* 키워드 */
.kw-section { display: flex; flex-direction: column; gap: 20px; }
.kw-label { font-size: 12px; font-weight: 700; color: #444; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.kw-label-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: #F04D22; color: #fff; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.tag-pool { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag { display: inline-flex; align-items: center; padding: 5px 12px; border-radius: 50px; border: 1px solid #e0ddd6; background: #faf9f7; font-size: 12px; font-weight: 700; color: #555; cursor: pointer; transition: all 0.12s; user-select: none; }
.tag:hover { border-color: #F04D22; color: #F04D22; background: #fff5f2; }
.tag.selected { background: #F04D22; border-color: #F04D22; color: #fff; }
.tag.custom-tag { border-style: dashed; }
.tag.custom-tag.selected { border-style: solid; }
.custom-row { display: flex; gap: 6px; margin-top: 4px; }
.custom-input { flex: 1; padding: 6px 12px; border: 1px dashed #d0cdc6; border-radius: 50px; font-family: 'Nanum Square AC', sans-serif; font-size: 12px; color: #1a1a1a; background: #faf9f7; outline: none; }
.custom-input:focus { border-color: #F04D22; background: #fff; border-style: solid; }
.btn-add { padding: 6px 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 50px; font-family: 'Nanum Square AC', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.12s; }
.btn-add:hover { background: #F04D22; }
.preview-bar { min-height: 32px; padding: 6px 10px; background: #f0ece6; border-radius: 8px; font-size: 12px; color: #bbb; margin-top: 8px; line-height: 1.6; }
.preview-bar.active { color: #333; }
.divider { border: none; border-top: 0.5px solid #ebe8e2; margin: 4px 0; }

.btn-generate { width: 100%; padding: 14px; background: #F04D22; color: #fff; font-family: 'Nanum Square AC', sans-serif; font-size: 15px; font-weight: 800; border: none; border-radius: 10px; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-generate:hover { background: #d43d15; }
.btn-generate:active { transform: scale(0.99); }
.btn-generate:disabled { background: #ccc; cursor: not-allowed; }
.spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.result-section { display: none; }
.result-card { background: #fff; border-radius: 16px; border: 0.5px solid #e0ddd6; padding: 1.5rem; margin-bottom: 1rem; margin-top: 1rem; }
.result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.result-header h2 { font-size: 16px; font-weight: 800; }
.btn-copy-all { padding: 8px 16px; background: #1a1a1a; color: #fff; font-family: 'Nanum Square AC', sans-serif; font-size: 12px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
.btn-copy-all:hover { background: #F04D22; }
.result-item { margin-bottom: 1.25rem; }
.result-item:last-child { margin-bottom: 0; }
.result-label { font-size: 12px; font-weight: 700; color: #F04D22; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.btn-copy-item { background: none; border: 1px solid #e0ddd6; border-radius: 6px; padding: 3px 10px; font-size: 11px; color: #888; cursor: pointer; font-family: 'Nanum Square AC', sans-serif; transition: all 0.15s; }
.btn-copy-item:hover { border-color: #F04D22; color: #F04D22; }
.result-text { font-size: 14px; line-height: 1.8; color: #1a1a1a; background: #faf9f7; border-radius: 8px; padding: 12px 14px; border: 0.5px solid #e0ddd6; white-space: pre-wrap; word-break: break-word; }
.result-divider { border: none; border-top: 0.5px solid #e8e6e0; margin: 1.25rem 0; }

.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>인턴 면담 일지 <span class="accent">자동 작성기</span></h1>
    <p>키워드를 선택하면 AI가 면담 일지를 작성해드립니다</p>
  </header>

  <div class="card">
    <div class="card-title">기본 정보</div>
    <div class="form-grid">
      <div>
        <label>인턴 이름</label>
        <input type="text" id="internName" placeholder="예: 홍길동" />
      </div>
      <div>
        <label>면담일</label>
        <input type="date" id="interviewDate" />
      </div>
      <div>
        <label>직무 / 부서</label>
        <select id="jobRole" onchange="onJobRoleChange(this)">
          <option value="">팀 선택</option>
          <option value="CX팀">CX팀</option>
          <option value="초등팀">초등팀</option>
          <option value="마케팅팀">마케팅팀</option>
          <option value="개발팀">개발팀</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div>
        <label>입사 주차</label>
        <select id="weekNum">
          <option value="">선택</option>
          <option value="1">1주차</option><option value="2">2주차</option>
          <option value="3">3주차</option><option value="4">4주차</option>
          <option value="5">5주차</option><option value="6">6주차</option>
          <option value="7">7주차</option><option value="8">8주차</option>
          <option value="9">9주차</option><option value="10">10주차</option>
        </select>
      </div>
    </div>
  </div>


  <div class="card">
    <div class="card-title">면담 키워드 선택</div>
    <div class="kw-section">
      <div class="kw-block">
        <div class="kw-label"><span class="kw-label-num">1</span> 면담 내용 <span class="sub">— 해당 항목 모두 선택</span></div>
        <div class="tag-pool" id="pool-interview"></div>
        <div class="custom-row">
          <input class="custom-input" id="custom-interview" placeholder="직접 입력 후 추가..." />
          <button class="btn-add" onclick="addCustomTag('interview')">+ 추가</button>
        </div>
        <div class="preview-bar" id="preview-interview">선택된 키워드가 없습니다</div>
      </div>
      <hr class="divider">
      <div class="kw-block">
        <div class="kw-label"><span class="kw-label-num">2</span> 건의 및 문의 <span class="sub">— 해당 항목 모두 선택</span></div>
        <div class="tag-pool" id="pool-suggestion"></div>
        <div class="custom-row">
          <input class="custom-input" id="custom-suggestion" placeholder="직접 입력 후 추가..." />
          <button class="btn-add" onclick="addCustomTag('suggestion')">+ 추가</button>
        </div>
        <div class="preview-bar" id="preview-suggestion">선택된 키워드가 없습니다</div>
      </div>
      <hr class="divider">
      <div class="kw-block">
        <div class="kw-label"><span class="kw-label-num">3</span> 조치사항 <span class="sub">— 해당 항목 모두 선택</span></div>
        <div class="tag-pool" id="pool-action"></div>
        <div class="custom-row">
          <input class="custom-input" id="custom-action" placeholder="직접 입력 후 추가..." />
          <button class="btn-add" onclick="addCustomTag('action')">+ 추가</button>
        </div>
        <div class="preview-bar" id="preview-action">선택된 키워드가 없습니다</div>
      </div>
      <hr class="divider">
      <div class="kw-block">
        <div class="kw-label"><span class="kw-label-num">4</span> 기타 <span class="sub">— 해당 항목 모두 선택</span></div>
        <div class="tag-pool" id="pool-etc"></div>
        <div class="custom-row">
          <input class="custom-input" id="custom-etc" placeholder="직접 입력 후 추가..." />
          <button class="btn-add" onclick="addCustomTag('etc')">+ 추가</button>
        </div>
        <div class="preview-bar" id="preview-etc">선택된 키워드가 없습니다</div>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="btnGenerate" onclick="generateReport()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">✦ AI로 면담 일지 작성하기</span>
  </button>

  <div class="result-section" id="resultSection">
    <div class="result-card">
      <div class="result-header">
        <h2>작성된 면담 일지</h2>
        <button class="btn-copy-all" onclick="copyAll()">📋 전체 복사</button>
      </div>
      <div class="result-item">
        <div class="result-label">면담 내용 <button class="btn-copy-item" onclick="copyItem('resultInterview')">복사</button></div>
        <div class="result-text" id="resultInterview"></div>
      </div>
      <hr class="result-divider">
      <div class="result-item">
        <div class="result-label">건의 및 문의 <button class="btn-copy-item" onclick="copyItem('resultSuggestion')">복사</button></div>
        <div class="result-text" id="resultSuggestion"></div>
      </div>
      <hr class="result-divider">
      <div class="result-item">
        <div class="result-label">조치사항 <button class="btn-copy-item" onclick="copyItem('resultAction')">복사</button></div>
        <div class="result-text" id="resultAction"></div>
      </div>
      <hr class="result-divider">
      <div class="result-item">
        <div class="result-label">기타 <button class="btn-copy-item" onclick="copyItem('resultEtc')">복사</button></div>
        <div class="result-text" id="resultEtc"></div>
      </div>
    </div>
  </div>
</div>

<footer style="text-align:center;padding:2rem 0 1rem;font-size:11px;color:#bbb;font-family:'Nanum Square AC',sans-serif;font-weight:700;letter-spacing:0.08em;">제작 · CX팀</footer>
<div class="toast" id="toast"></div>

const selected = { interview: [], suggestion: [], action: [], etc: [] };

function onJobRoleChange(sel) {
  const val = sel.value;
  if (!val) return;
  const teamKey = val === 'CX팀' ? 'cx'
    : val === '초등팀' ? 'elementary'
    : val === '마케팅팀' ? 'marketing'
    : val === '개발팀' ? 'dev' : 'common';
  loadKeywords(teamKey);
  showToast(val + ' 키워드로 변경되었습니다');
}






function loadKeywords(teamKey) {
  const preset = PRESETS[teamKey];
  ['interview','suggestion','action','etc'].forEach(key => {
    selected[key] = [];
    const pool = document.getElementById('pool-' + key);
    pool.innerHTML = '';
    preset[key].forEach(text => pool.appendChild(createTagEl(text, key, false)));
    updatePreview(key);
  });
}

function createTagEl(text, key, isCustom) {
  const tag = document.createElement('span');
  tag.className = 'tag' + (isCustom ? ' custom-tag' : '');
  tag.textContent = text;
  tag.dataset.value = text;
  tag.addEventListener('click', () => toggleTag(tag, key, text));
  return tag;
}

function toggleTag(el, key, text) {
  const idx = selected[key].indexOf(text);
  if (idx === -1) { selected[key].push(text); el.classList.add('selected'); }
  else { selected[key].splice(idx, 1); el.classList.remove('selected'); }
  updatePreview(key);
}

function addCustomTag(key) {
  const input = document.getElementById('custom-' + key);
  const val = input.value.trim();
  if (!val) return;
  const pool = document.getElementById('pool-' + key);
  const existing = pool.querySelector('[data-value="' + CSS.escape(val) + '"]');
  if (existing) { if (!existing.classList.contains('selected')) toggleTag(existing, key, val); input.value = ''; return; }
  const tag = createTagEl(val, key, true);
  const del = document.createElement('span');
  del.textContent = '×';
  del.style.cssText = 'margin-left:4px;font-size:13px;line-height:1;opacity:0.7;';
  del.addEventListener('click', (e) => {
    e.stopPropagation();
    const idx = selected[key].indexOf(val);
    if (idx !== -1) selected[key].splice(idx, 1);
    tag.remove();
    updatePreview(key);
  });
  tag.appendChild(del);
  pool.appendChild(tag);
  selected[key].push(val);
  tag.classList.add('selected');
  updatePreview(key);
  input.value = '';
}

function updatePreview(key) {
  const el = document.getElementById('preview-' + key);
  if (selected[key].length === 0) { el.textContent = '선택된 키워드가 없습니다'; el.classList.remove('active'); }
  else { el.textContent = selected[key].join('  ·  '); el.classList.add('active'); }
}

async function generateReport() {
  const jobRole = document.getElementById('jobRole').value.trim();
  if (!jobRole) { showToast('팀과 직무를 먼저 선택해주세요'); return; }
  if (selected.interview.length === 0) { showToast('면담 내용 키워드를 1개 이상 선택해주세요'); return; }

  const btn = document.getElementById('btnGenerate');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  btn.disabled = true; spinner.style.display = 'block'; btnText.textContent = 'AI가 작성 중입니다...';

  const internName = document.getElementById('internName').value.trim() || '인턴';
  const interviewDate = document.getElementById('interviewDate').value;
  const weekNum = document.getElementById('weekNum').value;

  const systemPrompt = `당신은 청년일경험 지원사업의 기업 멘토입니다. 인턴 면담 일지를 작성합니다.
규칙: 각 항목 1~2문장, 간명한 서술체(~함. ~확인함. ~예정임.), 사실 위주, 직무 맥락에 맞는 구체적 내용, 목록 나열 금지, 순수 JSON만 응답`;

  const userPrompt = `인턴 면담 일지 4개 항목을 작성해주세요.
인턴: ${internName} | 직무·부서: ${jobRole} | ${weekNum ? weekNum + '주차' : ''} | ${interviewDate}
면담 내용 키워드: ${selected.interview.join(', ')}
건의 및 문의 키워드: ${selected.suggestion.length ? selected.suggestion.join(', ') : '없음'}
조치사항 키워드: ${selected.action.length ? selected.action.join(', ') : '없음'}
기타 키워드: ${selected.etc.length ? selected.etc.join(', ') : '없음'}
{"interview":"...","suggestion":"...","action":"...","etc":"..."}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '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',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);
    document.getElementById('resultInterview').textContent = parsed.interview || '';
    document.getElementById('resultSuggestion').textContent = parsed.suggestion || '';
    document.getElementById('resultAction').textContent = parsed.action || '';
    document.getElementById('resultEtc').textContent = parsed.etc || '';
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    showToast('면담 일지가 작성되었습니다 ✓');
  } catch (err) {
    showToast('오류가 발생했습니다. 다시 시도해주세요.');
    console.error(err);
  } finally {
    btn.disabled = false; spinner.style.display = 'none'; btnText.textContent = '✦ AI로 면담 일지 다시 작성하기';
  }
}

function copyItem(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => showToast('복사되었습니다'));
}

function copyAll() {
  const parts = [
    '면담 내용:\n' + document.getElementById('resultInterview').textContent,
    '\n건의 및 문의:\n' + document.getElementById('resultSuggestion').textContent,
    '\n조치사항:\n' + document.getElementById('resultAction').textContent,
    '\n기타:\n' + document.getElementById('resultEtc').textContent,
  ];
  navigator.clipboard.writeText(parts.join('\n')).then(() => showToast('전체 내용이 복사되었습니다'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
